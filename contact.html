<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Contact Me</title>
    <link rel="stylesheet" href="./css/contact.css">
</head>

<body>
    <main class="contact-page">
        <a href="index.html" class="back-button">&#8592; Back</a>
        <section class="contact-details">
            <h2>Contact Details</h2>
            <ul>
                <li>
                    <a href="https://www.facebook.com/Mijan.CSE.PUST">
                        <span class="icon"><img src="./images/facebooklogo.png" /></span> Facebook
                    </a>
                </li>
                <li class="separator">|</li>
                <li>
                    <a href="https://wa.me/01740017938">
                        <span class="icon"><img src="./images/whatsapplogo.png" /></span> WhatsApp
                    </a>
                </li>
                <li class="separator">|</li>
                <li>
                    <a href="https://github.com/Mijan2001">
                        <span class="icon"><img src="./images/githublogo.png" /></span> GitHub
                    </a>
                </li>
                <li class="separator">|</li>
                <li>
                    <a href="https://www.linkedin.com/in/Mijan2001">
                        <span class="icon"><img src="./images/linkedinlogo.png" /></span> LinkedIn
                    </a>
                </li>
            </ul>
        </section>


        <section class="contact-form">
            <h2>Contact Me</h2>
            <form action="#" method="post">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Your Email</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Your Message</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>
</body>

</html>
